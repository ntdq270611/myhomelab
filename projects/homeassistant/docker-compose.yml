version: '3'
services:
  homeassistant:
    container_name: homeassistant
    image: homeassistant/home-assistant:stable
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Ho_Chi_Minh # Replace with your actual timezone, e.g., America/New_York
    network_mode: host # Recommended for integrations relying on discovery protocols
    restart: unless-stopped