- name: Server
  width: slim
  hide-desktop-navigation: false
  center-vertically: true
  columns:
    - size: small
      widgets:
        - type: clock
          hour-format: 24h
        - type: custom-api
          title: Tailscale Devices
          title-url: https://login.tailscale.com/admin/machines
          url: https://api.tailscale.com/api/v2/tailnet/-/devices
          headers:
            Authorization: Bearer tskey-api-knzJ1ADrqZ11CNTRL-H2oLnd2sFeBgX3yPKqWteBi1PKwm79bK
          cache: 10m
          template: |
             {{/* User Variables */}}
             {{/* Set to true if you'd like an indicator for online devices */}}
             {{ $enableOnlineIndicator := true }}

             <style>
               .device-info-container {
                 position: relative;
                 overflow: hidden;
                 height: 1.5em;
               }

               .device-info {
                 display: flex;
                 transition: transform 0.2s ease, opacity 0.2s ease;
               }

               .device-ip {
                 position: absolute;
                 top: 0;
                 left: 0;
                 transform: translateY(-100%);
                 opacity: 0;
                 transition: transform 0.2s ease, opacity 0.2s ease;
               }

               .device-info-container:hover .device-info {
                 transform: translateY(100%);
                 opacity: 0;
               }

               .device-info-container:hover .device-ip {
                 transform: translateY(0);
                 opacity: 1;
               }

               .update-indicator {
                 width: 8px;
                 height: 8px;
                 border-radius: 50%;
                 background-color: var(--color-primary);
                 display: inline-block;
                 margin-left: 4px;
                 vertical-align: middle;
               }

               .offline-indicator {
                 width: 8px;
                 height: 8px;
                 border-radius: 50%;
                 background-color: var(--color-negative);
                 display: inline-block;
                 margin-left: 4px;
                 vertical-align: middle;
               }

               .online-indicator {
                 width: 8px;
                 height: 8px;
                 border-radius: 50%;
                 background-color: var(--color-positive);
                 display: inline-block;
                 margin-left: 4px;
                 vertical-align: middle;
               }

               .device-name-container {
                 display: flex;
                 align-items: center;
                 gap: 8px;
               }

               .indicators-container {
                 display: flex;
                 align-items: center;
                 gap: 4px;
               }
             </style>
             <ul class="list list-gap-10 collapsible-container" data-collapse-after="4">
               {{ range .JSON.Array "devices" }}
               <li>
                 <div class="flex items-center gap-10">
                   <div class="device-name-container grow">
                     <span class="size-h4 block text-truncate color-primary">
                       {{ findMatch "^([^.]+)" (.String "name") }}
                     </span>
                     <div class="indicators-container">
                       {{ if (.Bool "updateAvailable") }}
                       <span class="update-indicator" data-popover-type="text" data-popover-text="Update Available"></span>
                       {{ end }}

                       {{ $lastSeen := .String "lastSeen" | parseTime "rfc3339" }}
                       {{ if not ($lastSeen.After (offsetNow "-10s")) }}
                       {{ $lastSeenTimezoned := $lastSeen.In now.Location }}
                       <span class="offline-indicator" data-popover-type="text"
                         data-popover-text="Offline - Last seen {{ $lastSeenTimezoned.Format " Jan 2 3:04pm" }}"></span>
                       {{ else if $enableOnlineIndicator }}
                         <span class="online-indicator" data-popover-type="text" data-popover-text="Online"></span>
                       {{ end }}
                     </div>
                   </div>
                 </div>
                 <div class="device-info-container">
                   <ul class="list-horizontal-text device-info">
                     <li>{{ .String "os" }}</li>
                     <li>{{ .String "user" }}</li>
                   </ul>
                   <div class="device-ip">
                     {{ .String "addresses.0"}}
                   </div>
                 </div>
               </li>
               {{ end }}
             </ul>
        - type: custom-api
          hide-header: true
          title: Should I deploy today
          # cache: 1h
          url: https://shouldideploy.today/api?tz=Asia%2FHo_Chi_Minh
          method: GET
          template: |
            <div class="deploy-card {{ if .JSON.Bool "shouldideploy" }}deploy-yes{{ else }}deploy-no{{ end }}">
              <style>
                .deploy-card {
                  width: 100%;
                  max-width: unset;
                  margin: 0;
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                  transition: transform 0.2s ease, box-shadow 0.2s ease;
                  border-radius: 12px;
                  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                  padding: 24px 20px 18px 20px;
                  text-align: left;
                }
                .deploy-card.deploy-yes {
                  background: #9FC87E;
                }
                .deploy-card.deploy-no {
                  background: #FF3F33;
                }
                .deploy-card h1 {
                  font-size: 24px;
                  margin: 0 0 16px;
                  line-height: 1.3;
                  color: #FFE6E1;
                }
                .deploy-message {
                  font-size: 20px;
                  font-weight: 600;
                  margin: 12px 0 8px 0;
                  color: #232634;
                }
                .deploy-date {
                  font-size: 14px;
                  color: #232634;
                  margin-bottom: 4px;
                }
                .deploy-tz {
                  font-size: 13px;
                  color: #075B5E;
                }
                @media (max-width: 600px) {
                  .deploy-card {
                    padding: 16px;
                  }
                  .deploy-card h1 {
                    font-size: 20px;
                  }
                  .deploy-message {
                    font-size: 16px;
                  }
                }
              </style>
              <h1>Should I deploy today?</h1>
              <div class="deploy-message">{{ .JSON.String "message" }}</div>
              <div class="deploy-tz">Timezone: {{ .JSON.String "timezone" }}</div>
            </div>
        - type: custom-api
          cache: 1h
          title: Internet Speed
          title-url: https://speedtest.ntdq211.indevs.in/
          url: https://speedtest.ntdq211.indevs.in/api/v1/results/latest
          headers:
            Authorization: Bearer LmMT4Gw0C2YXzHyusnmD5FKnENU79jXvUhvXW9f9c952aa89
            Accept: application/json
          subrequests:
            stats:
              url: https://speedtest.ntdq211.indevs.in/api/v1/stats
              headers:
                Authorization: Bearer LmMT4Gw0C2YXzHyusnmD5FKnENU79jXvUhvXW9f9c952aa89
                Accept: application/json
          options:
            showPercentageDiff: true
          template: |
            {{ $showPercentage := .Options.BoolOr "showPercentageDiff" true }}
        
            {{ $stats := .Subrequest "stats" }}
            <div class="flex justify-between text-center margin-block-3">
            <div>
                {{ $downloadChange := percentChange ($stats.JSON.Float "data.download.avg_bits") (.JSON.Float "data.download_bits")
                }}
                {{ if $showPercentage }}
                <div
                class="size-small {{ if gt $downloadChange 0.0 }}color-positive{{ else if lt $downloadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}"
                style="display: inline-flex; align-items: center;">
                {{ $downloadChange | printf "%+.1f%%" }}
                {{ if gt $downloadChange 0.0 }}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    style="height: 1em; margin-left: 0.25em;" class="size-4">
                    <path fill-rule="evenodd"
                    d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                    clip-rule="evenodd" />
                </svg>
                {{ else if lt $downloadChange 0.0 }}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    style="height: 1em; margin-left: 0.25em;" class="size-4">
                    <path fill-rule="evenodd"
                    d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                    clip-rule="evenodd" />
                </svg>
                {{ end }}
                </div>
                {{ end }}
                <div class="color-highlight size-h3">{{ .JSON.Float "data.download_bits" | mul 0.000001 | printf "%.1f" }}</div>
                <div class="size-h6">DOWNLOAD</div>
            </div>
            <div>
                {{ $uploadChange := percentChange ($stats.JSON.Float "data.upload.avg_bits") (.JSON.Float "data.upload_bits") }}
                {{ if $showPercentage }}
                <div
                class="size-small {{ if gt $uploadChange 0.0 }}color-positive{{ else if lt $uploadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}"
                style="display: inline-flex; align-items: center;">
                {{ $uploadChange | printf "%+.1f%%" }}
                {{ if gt $uploadChange 0.0 }}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    style="height: 1em; margin-left: 0.25em;" class="size-4">
                    <path fill-rule="evenodd"
                    d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                    clip-rule="evenodd" />
                </svg>
                {{ else if lt $uploadChange 0.0 }}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    style="height: 1em; margin-left: 0.25em;" class="size-4">
                    <path fill-rule="evenodd"
                    d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                    clip-rule="evenodd" />
                </svg>
                {{ end }}
                </div>
                {{ end }}
                <div class="color-highlight size-h3">{{ .JSON.Float "data.upload_bits" | mul 0.000001 | printf "%.1f" }}</div>
                <div class="size-h6">UPLOAD</div>
            </div>
            <div>
                {{ $pingChange := percentChange ($stats.JSON.Float "data.ping.avg") (.JSON.Float "data.ping") }}
                {{ if $showPercentage }}
                <div
                class="size-small {{ if gt $pingChange 0.0 }}color-negative{{ else if lt $pingChange 0.0 }}color-positive{{ else }}color-primary{{ end }}"
                style="display: inline-flex; align-items: center;">
                {{ $pingChange | printf "%+.1f%%" }}
                {{ if lt $pingChange 0.0 }}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    style="height: 1em; margin-left: 0.25em;" class="size-4">
                    <path fill-rule="evenodd"
                    d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                    clip-rule="evenodd" />
                </svg>
                {{ else if gt $pingChange 0.0 }}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    style="height: 1em; margin-left: 0.25em;" class="size-4">
                    <path fill-rule="evenodd"
                    d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                    clip-rule="evenodd" />
                </svg>
                {{ end }}
                </div>
                {{ end }}
                <div class="color-highlight size-h3">{{ .JSON.Float "data.ping" | printf "%.0f ms" }}</div>
                <div class="size-h6">PING</div>
            </div>
            </div>
        - type: dns-stats
          service: adguard
          url: "https://adguard.ntdq211.indevs.in"
          username: ntdq211
          password: quangserver2011@686
    - size: full
      widgets:
        - type: custom-api
          title: Media Server
          cache: 1m
          options:
            media-server: "jellyfin"
            base-url: https://jellyfin.ntdq211.indevs.in
            api-key: 3d3b8abb3e0d46169319a44ac93804f8
            small-column: false
            compact: false
            play-state: "indicator"
            show-thumbnail: true
            full-thumbnail: true
            show-paused: true
            show-progress-bar: true
            show-progress-info: true
            time-format: "15:04"
            time-zone: "Asia/Ho_Chi_Minh"
          template: |
            {{ $mediaServer := .Options.StringOr "media-server" "" }}
            {{ $baseURL := .Options.StringOr "base-url" "" }}
            {{ $apiKey := .Options.StringOr "api-key" "" }}
        
            {{ define "errorMsg" }}
              <div class="widget-error-header">
                <div class="color-negative size-h3">ERROR</div>
                <svg class="widget-error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"></path>
                </svg>
              </div>
              <p class="break-all">{{ . }}</p>
            {{ end }}
        
            {{ if or
              (eq $mediaServer "")
              (eq $baseURL "")
              (eq $apiKey "")
            }}
              {{ template "errorMsg" "Some required options are not set" }}
            {{ else }}
        
            {{ $isSmallColumn := .Options.BoolOr "small-column" false }}
            {{ $isCompact := .Options.BoolOr "compact" true }}
            {{ $playState := .Options.StringOr "play-state" "indicator" }}
            {{ $showThumbnail := .Options.BoolOr "show-thumbnail" false }}
            {{ $fullThumbnail := .Options.BoolOr "full-thumbnail" false }}
            {{ $showPaused := .Options.BoolOr "show-paused" false }}
            {{ $showProgressBar := .Options.BoolOr "show-progress-bar" false }}
            {{ $showProgressInfo := .Options.BoolOr "show-progress-info" true }}
            {{ $timeFormat := .Options.StringOr "time-format" "15:04" }}
        
            {{ $userID := "" }}
            {{ $sessionsRequestURL := "" }}
            {{ $sessionsCall := "" }}
            {{ $sessions := "" }}
            {{ $activeSessions := 0 }}
        
            {{ if eq $mediaServer "plex" }}
              {{ $sessionsRequestURL = concat $baseURL "/status/sessions" }}
              {{ $sessionsCall = newRequest $sessionsRequestURL
                | withHeader "Accept" "application/json"
                | withHeader "X-Plex-Token" $apiKey
                | getResponse }}
        
              {{ if $sessionsCall.JSON.Exists "MediaContainer" }}
                {{ $sessions = $sessionsCall.JSON.Array "MediaContainer.Metadata" }}
                {{ $activeSessions = len $sessions }}
              {{ else }}
                {{ template "errorMsg" (concat "Could not fetch " $mediaServer " API.") }}
              {{ end }}
        
            {{ else if eq $mediaServer "tautulli" }}
              {{ $sessionsRequestURL = concat $baseURL "/api/v2" }}
              {{ $sessionsCall = newRequest $sessionsRequestURL
                | withParameter "apikey" $apiKey
                | withParameter "cmd" "get_activity"
                | withHeader "Accept" "application/json"
                | getResponse }}
        
              {{ if eq $sessionsCall.Response.StatusCode 200 }}
                {{ $sessions = $sessionsCall.JSON.Array "response.data.sessions" }}
                {{ $activeSessions = len $sessions }}
              {{ else }}
                {{ template "errorMsg" (concat "Could not fetch " $mediaServer " API.") }}
              {{ end }}
        
            {{ else if or (eq $mediaServer "jellyfin") (eq $mediaServer "emby") }}
              {{ $sessionsRequestURL = concat $baseURL "/Sessions" }}
              {{ $sessionsCall = newRequest $sessionsRequestURL
                | withParameter "api_key" $apiKey
                | withParameter "activeWithinSeconds" "30"
                | withHeader "Accept" "application/json"
                | getResponse }}
        
              {{ if eq $sessionsCall.Response.StatusCode 200 }}
                {{ $sessions = $sessionsCall.JSON.Array "" }}
                {{ if eq $mediaServer "emby" }}
                  {{ range $session := $sessions }}
                    {{ if $session.Bool "PlayState.CanSeek" }}
                      {{ $activeSessions = 1 }}
                      {{ break }}
                    {{ end }}
                  {{ end }}
                {{ else }}
                  {{ $activeSessions = len $sessions }}
                {{ end }}
              {{ else }}
                {{ template "errorMsg" (concat "Could not fetch " $mediaServer " API.") }}
              {{ end }}
            {{ end }}

            {{ if and (eq $sessionsCall.Response.StatusCode 200) (eq $activeSessions 0) }}
              <p>Nothing is playing right now.</p>
            {{ else }}

              <style>
                .media-server-session-container--grid {
                  display: grid;
                  grid-template-columns: repeat(2, 1fr);
                }
                @media (max-width: 768px) {
                  .media-server-session-container--grid {
                    display: flex;
                    flex-direction: column;
                  }
                }
                .media-server-progress-container {
                  height: 1rem;
                  max-width: 32rem;
                  border: 1px solid var(--color-text-base);
                  border-radius: var(--border-radius);
                  overflow: hidden;
                }
                .media-server-progress-bar {
                  height: 100%;
                  background: var(--color-primary);
                  border-radius: 3px;
                  transition: width 1s linear;
                }
                @keyframes progress-animation { to { width: 100%; } }
              </style>

              <div class="gap-10 {{ if $isSmallColumn }}flex flex-column{{ else }}media-server-session-container--grid{{ end }}">
              {{ range $i, $session := $sessions }}
                {{ $isClient := true }}
                {{ $isPlaying := false }}
                {{ $state := "playing" }}
                {{ $isMovie := false }}
                {{ $isShows := false }}
                {{ $isMusic := false }}
                {{ $userName := "" }}
                {{ $title := "" }}
                {{ $showTitle := "" }}
                {{ $showSeason := "" }}
                {{ $showEpisode := "" }}
                {{ $artist := "" }}
                {{ $albumTitle := "" }}
                {{ $thumbURL := "" }}
                {{ $now := now | formatTime "15:04:05" | parseLocalTime "15:04:05" }}
                {{ $duration := 0 }}
                {{ $offset := 0 }}
                {{ $remainingSeconds := 0 }}
        
                {{ if eq $mediaServer "plex" }}
                  {{ $isPlaying = eq ($session.String "Player.state") "playing" }}
                  {{ if not $isPlaying }}
                    {{ $state = "paused"}}
                  {{ end }}
        
                  {{ $mediaType := $session.String "type" }}
                  {{ $isMovie = eq $mediaType "movie" }}
                  {{ $isShows = eq $mediaType "episode" }}
                  {{ $isMusic = eq $mediaType "track" }}
        
                  {{ $userName = $session.String "User.title" }}
                  {{ $title = $session.String "title" }}
                  {{ $showTitle = $session.String "grandparentTitle" }}
                  {{ $showSeason = $session.String "parentIndex" }}
                  {{ $showEpisode = $session.String "index" }}
                  {{ $artist = $session.String "grandparentTitle" }}
                  {{ $albumTitle = $session.String "parentTitle" }}

                  {{ $thumbID := $session.String "thumb" }}
                  {{ if or $isShows $isMusic }}
                    {{ $thumbID = $session.String "parentThumb" }}
                  {{ end }}
                  {{ $thumbURL = concat $baseURL $thumbID "?X-Plex-Token=" $apiKey }}

                  {{ $duration = $session.Float "duration" }}
                  {{ $offset = $session.Float "viewOffset" }}
                  {{ $remainingSeconds = div (sub $duration $offset) 1000 | toInt }}
                {{ else if eq $mediaServer "tautulli" }}
                  {{ $isPlaying = eq ($session.String "state") "playing" }}
                  {{ if not $isPlaying }}
                    {{ $state = "paused"}}
                  {{ end }}

                  {{ $mediaType := $session.String "media_type" }}
                  {{ $isMovie = eq $mediaType "movie" }}
                  {{ $isShows = eq $mediaType "episode" }}
                  {{ $isMusic = eq $mediaType "track" }}

                  {{ $userName = $session.String "user" }}
                  {{ $title = $session.String "title" }}
                  {{ $showTitle = $session.String "grandparent_title" }}
                  {{ $showSeason = $session.String "parent_media_index" }}
                  {{ $showEpisode = $session.String "media_index" }}
                  {{ $artist = $session.String "grandparent_title" }}
                  {{ $albumTitle = $session.String "parent_title" }}
        
                  {{ $thumbID := $session.String "thumb" }}
                  {{ if or $isShows $isMusic }}
                    {{ $thumbID = $session.String "parent_thumb" }}
                  {{ end }}
                  {{ $thumbURL = concat $baseURL "/api/v2?apikey=" $apiKey "&cmd=pms_image_proxy&img=" $thumbID }}
        
                  {{ $duration = $session.Float "duration" }}
                  {{ $offset = $session.Float "view_offset" }}
                  {{ $remainingSeconds = div (sub $duration $offset) 1000 | toInt }}
                {{ else if or (eq $mediaServer "jellyfin") (eq $mediaServer "emby") }}
                  {{ if eq $mediaServer "emby" }}
                    {{ $isClient = $session.Bool "PlayState.CanSeek" }}
                  {{ end }}
                  {{ $isPlaying = and ($session.Exists "NowPlayingItem") (not ($session.Bool "PlayState.IsPaused")) }}
                  {{ if not $isPlaying }}
                    {{ $state = "paused"}}
                  {{ end }}
        
                  {{ $mediaType := $session.String "NowPlayingItem.Type" }}
                  {{ $isMovie = eq $mediaType "Movie" }}
                  {{ $isShows = eq $mediaType "Episode" }}
                  {{ $isMusic = eq $mediaType "Audio" }}
        
                  {{ $userName = $session.String "UserName" }}
                  {{ $title = $session.String "NowPlayingItem.Name" }}
                  {{ $showTitle = $session.String "NowPlayingItem.SeriesName" }}
                  {{ $showSeason = $session.String "NowPlayingItem.ParentIndexNumber" }}
                  {{ $showEpisode = $session.String "NowPlayingItem.IndexNumber" }}
                  {{ $artist = $session.String "NowPlayingItem.AlbumArtist" }}
                  {{ $albumTitle = $session.String "NowPlayingItem.Album" }}
        
                  {{ $thumbID := $session.String "NowPlayingItem.Id" }}
                  {{ if $isShows }}
                    {{ $thumbID = $session.String "NowPlayingItem.ParentId" }}
                  {{ end }}
                  {{ $thumbURL = concat $baseURL "/Items/" $thumbID "/Images/Primary?api_key=" $apiKey }}

                  {{ $duration = $session.Float "NowPlayingItem.RunTimeTicks" }}
                  {{ $offset = $session.Float "PlayState.PositionTicks" }}
                  {{ $remainingSeconds = div (sub $duration $offset) 10000000 | toInt }}
                {{ end }}
        
                {{ $progress := mul 100 (div $offset $duration) | toInt }}
                {{ $endTime := $now.Add (duration (printf "%ds" $remainingSeconds)) | formatTime $timeFormat }}
        
                {{ $showInfoFormat := concat "Season " $showSeason " Episode " $showEpisode}}
                {{ if $isCompact }}
                  {{ $showInfoFormat = concat "S" $showSeason "E" $showEpisode}}
                {{ end }}

                {{ if and $isClient (or $isPlaying $showPaused) }}
                <div class="card gap-5">
                  <div class="flex items-center gap-10 size-h3">
                    <span class="color-primary">{{ $userName }}</span>
                    {{ if eq $playState "text" }}
                      <span {{ if $isPlaying }}class="color-primary"{{ end }}>
                        [{{ $state }}]
                      </span>
                    {{ else if eq $playState "indicator" }}
                      <style>
                        .media-server-indicator {
                          height: .7rem;
                          width: .7rem;
                          border-radius: 100%;
                          {{ if $isPlaying }}
                            animation: pulse 5s infinite;
                            background: var(--color-primary);
                          {{ else }}
                            background: var(--color-text-base-muted);
                          {{ end }}
                        }
                        @keyframes pulse {
                          0% { box-shadow: 0 0 0 0 var(--color-text-base); }
                          40% { box-shadow: 0 0 0 4px transparent; }
                          100% { box-shadow: 0 0 0 4px transparent; }
                        }
                      </style>
                      <div class="media-server-indicator"></div>
                    {{ end }}
                  </div>

                  <hr class="margin-bottom-5" />
        
                  <div class="flex items-center gap-10" style="align-items: stretch;">
                    {{ if $showThumbnail }}
                      <img src="{{ $thumbURL | safeURL }}"
                        alt="{{ $title }} thumbnail"
                        class="shrink-0"
                        loading="lazy"
                        style="
                          max-width: 7.5rem;
                          border: 2px solid var(--color-primary);
                          border-radius: var(--border-radius);
                          object-fit: cover;
                          {{ if and $isCompact (not $fullThumbnail) }} aspect-ratio: 1; {{ end }} "
                      />
                    {{ end }}
                    <ul class="flex flex-column grow justify-evenly" style="width: 0;">
                      {{ if $isCompact }}
                        {{ if $isShows }}
                          <ul class="list-horizontal-text flex-nowrap">
                            <li class="shrink-0">{{ concat "S" $showSeason "E" $showEpisode }}</li>
                            <li class="text-truncate">{{ $showTitle }}</li>
                          </ul>
                        {{ else if $isMusic }}
                          <ul class="list-horizontal-text flex-nowrap">
                            <li class="shrink-0">{{ $artist }}</li>
                            <li class="text-truncate">{{ $albumTitle }}</li>
                          </ul>
                        {{ end }}
                        <li class="text-truncate">{{ $title }}</li>
                      {{ else }}
                        {{ if $isShows }}
                          <li>{{ $showTitle }}</li>
                          <li>{{ concat "S" $showSeason "E" $showEpisode }}</li>
                        {{ else if $isMusic }}
                          <li>{{ $artist }}</li>
                          <li>{{ $albumTitle }}</li>
                        {{ end }}
                        <li>{{ $title }}</li>
                      {{ end }}

                      <li>
                        {{ if and $isPlaying $showProgressBar }}
                          <div class="flex gap-10 items-center">
                            <div class="media-server-progress-container grow">
                              <div
                                class ="media-server-progress-bar"
                                data-progress="{{ $progress }}"
                                data-remaining="{{ $remainingSeconds }}"
                                style="
                                  width: {{ $progress }}%;
                                  animation: progress-animation {{ $remainingSeconds }}s linear forwards;"
                              >
                              </div>
                            </div>
                            {{ if $showProgressInfo }}
                              <p>
                                {{ if and (not $isCompact) (not $isSmallColumn) }}
                                  ends at 
                                {{ end }}
                                {{ $endTime }}
                              </p>
                            {{ end }}
                          </div>
                        {{ end }}
                      </li>
                    </ul>
                  </div>
                </div>
                {{ end }}
              {{ end }}
            </div>
            {{ end }}
            {{ end }}
